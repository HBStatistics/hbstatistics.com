<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://yt3.ggpht.com/veDA1FfRTsN5P5U97lgW9TRP4u0FnGRQIphD1DQs5TRvoHqZHU4xizu0UxIx5GMdnvKa8mkxQzw=s192-c-k-c0x00ffffff-no-rj">
    <title>YouTube Channel Stats Explorer</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #152238;
            --panel-strong: #1a2942;
            --text: #e6eefc;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, 0.2);
            --accent: #3b82f6;
            --accent-2: #0f766e;
            --accent-3: #60a5fa;
            --danger: #ef4444;
            --shadow: 0 18px 36px rgba(2, 8, 23, 0.34);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 24%),
                linear-gradient(180deg, #13203a 0%, var(--bg) 100%);
        }

        .page {
            width: min(1280px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 40px;
        }

        .hero,
        .panel {
            background: var(--panel);
            border: 1px solid rgba(96, 165, 250, 0.12);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 28px;
            margin-bottom: 18px;
            background:
                linear-gradient(180deg, rgba(29, 44, 74, 0.96), rgba(20, 31, 53, 0.98));
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }

        .brand-link,
        .nav-link {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        .brand-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .brand-link img {
            width: 34px;
            height: 34px;
            border-radius: 10px;
        }

        .nav-link {
            color: var(--accent-3);
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 0.9rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent-3);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1;
            max-width: 12ch;
            letter-spacing: -0.04em;
        }

        .hero p {
            max-width: 44rem;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.55;
        }

        .panel {
            padding: 22px;
        }

        .panel-section + .panel-section {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
        }

        .section-heading {
            margin: 0 0 12px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field.inline-toggle {
            justify-content: flex-end;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 2px;
            color: var(--muted);
            font-size: 0.95rem;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }

        .toggle input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--accent);
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input,
        select,
        button {
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 12px 14px;
            font: inherit;
            transition: border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
        }

        input,
        select,
        textarea {
            background: #0f1b31;
            color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        input:focus,
        select:focus,
        textarea:focus,
        button:focus {
            outline: 2px solid rgba(37, 99, 235, 0.25);
            outline-offset: 2px;
        }

        button {
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(29, 78, 216, 0.18);
        }

        button.secondary {
            background: #1c2a45;
            color: var(--accent);
            box-shadow: none;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        input:hover,
        select:hover,
        textarea:hover {
            border-color: rgba(37, 99, 235, 0.18);
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(29, 78, 216, 0.22);
        }

        button.secondary:hover:not(:disabled) {
            background: #223252;
            box-shadow: none;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) repeat(3, minmax(160px, auto)) minmax(180px, auto);
            align-items: start;
            gap: 12px;
        }

        .toolbar-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toolbar-actions button {
            width: 100%;
        }

        .toolbar .field {
            min-width: 0;
            align-self: start;
        }

        .field.inline-toggle {
            align-self: start;
            padding-top: 2px;
        }

        .field.nudge-up {
            margin-top: -22px;
        }

        .status {
            margin: 0;
            color: var(--muted);
            align-self: center;
            padding: 12px 14px;
            border-radius: 12px;
            background: #12203a;
            border: 1px solid rgba(96, 165, 250, 0.12);
        }

        .status.idle {
            visibility: hidden;
        }

        .status.error {
            color: var(--danger);
        }

        .meta {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 18px;
            align-items: center;
            margin-top: 24px;
            padding-bottom: 4px;
        }

        .meta img {
            width: 88px;
            height: 88px;
            border-radius: 16px;
            object-fit: cover;
            border: 1px solid rgba(96, 165, 250, 0.14);
            background: #0f1b31;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.12);
        }

        .meta h2 {
            margin: 0;
            font-size: clamp(1.6rem, 3vw, 2rem);
            letter-spacing: -0.02em;
        }

        .table-card {
            background: var(--panel-strong);
            border: 1px solid rgba(96, 165, 250, 0.12);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(2, 8, 23, 0.24);
        }

        .chart-card {
            background: #2f2f2f;
            border: 1px solid #464646;
            border-radius: 8px;
            padding: 26px 24px 24px;
            box-shadow: none;
        }

        .chart-card small {
            display: block;
            color: #ffffff;
            text-align: center;
            text-transform: none;
            letter-spacing: 0;
            font-size: 1.35rem;
            line-height: 1.2;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 22px;
            margin-top: 28px;
        }

        .chart-mode-control {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin-top: 24px;
            padding: 6px;
            border: 1px solid rgba(96, 165, 250, 0.12);
            border-radius: 12px;
            background: #10203a;
        }

        .chart-mode-button {
            min-height: 44px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            line-height: 1;
            box-shadow: none;
        }

        .chart-mode-button:hover,
        .chart-mode-button:focus-visible {
            transform: none;
            border-color: rgba(96, 165, 250, 0.24);
            background: rgba(59, 130, 246, 0.12);
            color: var(--text);
        }

        .chart-mode-button.active {
            border-color: rgba(96, 165, 250, 0.34);
            background: rgba(59, 130, 246, 0.2);
            color: #ffffff;
        }

        .chart-shell {
            position: relative;
            height: 420px;
            border-radius: 0;
            background: #2f2f2f;
            border: 0;
            padding: 0;
        }

        .chart-shell svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .chart-shell .chart-tooltip {
            position: absolute;
            min-width: 140px;
            max-width: 220px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(22, 22, 22, 0.96);
            color: #ffffff;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
            font-size: 0.9rem;
            line-height: 1.35;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 120ms ease, transform 120ms ease;
            z-index: 2;
        }

        .chart-shell .chart-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chart-shell .chart-tooltip strong {
            display: block;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .chart-shell .chart-tooltip span {
            display: block;
            color: rgba(255, 255, 255, 0.76);
            font-size: 0.82rem;
        }

        .chart-empty {
            height: 100%;
            display: grid;
            place-items: center;
            color: var(--muted);
            border: 1px dashed rgba(148, 163, 184, 0.18);
            border-radius: 16px;
        }

        .table-wrap {
            overflow: auto;
            margin-top: 14px;
            border-radius: 12px;
            border: 1px solid rgba(96, 165, 250, 0.12);
            background: #14213a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
            background: #14213a;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        th {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            background: #10203a;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .metric-cell {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            white-space: nowrap;
        }

        .metric-gain {
            color: #22c55e;
            font-size: 0.82em;
            font-weight: 700;
        }

        .metric-gain.negative {
            color: var(--danger);
        }

        .metric-gain.neutral {
            color: var(--muted);
        }

        .hidden {
            display: none;
        }

        .site-footer {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 0.04em;
        }

        @media (max-width: 980px) {
            .controls,
            .toolbar,
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .status {
                order: 4;
            }
        }

        @media (max-width: 640px) {
            .page {
                width: min(100% - 20px, 1200px);
                padding-top: 20px;
            }

            .hero,
            .panel {
                padding: 18px;
                border-radius: 20px;
            }

            .meta {
                grid-template-columns: 1fr;
            }

            .top-nav {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const formData = new FormData(form);
            const channelIds = parseChannelIds(String(formData.get("channelIds") || ""));
            const fromDate = DEFAULT_FROM_DATE;
            const toDate = getCurrentUtcDateString();

            if (!channelIds.length) {
                setStatus("Enter at least one channel ID.", true);
                return;
            }

            setLoading(true);
            setStatus("Fetching channel data...");

            try {
                const vidiqUrl = new URL(VIDIQ_STATS_ENDPOINT);
                vidiqUrl.searchParams.set("ids", channelIds.join(","));
                vidiqUrl.searchParams.set("from", fromDate);
                vidiqUrl.searchParams.set("to", toDate);
                vidiqUrl.searchParams.set("interpolate", "true");

                const response = await fetchVidiqStats(vidiqUrl);
                if (!response.ok) {
                    const errorPayload = await response.json().catch(() => null);
                    throw new Error(errorPayload?.error || "API request failed with status " + response.status);
                }

                const payload = await response.json();

                if (payload?.error) {
                    throw new Error(payload.error);
                }

                const channels = Array.isArray(payload) ? payload : (payload ? [payload] : []);
                const normalizedChannels = channels
                    .filter((channel) => channel && Array.isArray(channel.stats) && channel.stats.length > 0)
                    .map((channel) => ({
                        ...channel,
                        stats: channel.stats
                            .slice()
                            .sort((a, b) => new Date(a.recorded_at) - new Date(b.recorded_at))
                    }));

                if (!normalizedChannels.length) {
                    throw new Error("No stats were returned for the provided channel IDs and date range.");
                }

                latestChannels = normalizedChannels;
                latestChannel = normalizedChannels[0];
                latestRawStats = latestChannel.stats.slice();

                rerenderLatestChannel();
                if (normalizedChannels.length > 1) {
                    setStatus("Loaded " + normalizedChannels.length + " channels. Showing the first result.");
                } else {
                    clearStatus();
                }

                latestChannels = [];
                latestChannel = null;
                latestRawStats = [];
                latestStats = [];
                resultsEl.classList.add("hidden");
                downloadButton.disabled = true;
                downloadAllButton.disabled = true;
                setStatus(getFetchErrorMessage(error), true);
            } finally {
                setLoading(false);
            }
        });

        async function fetchVidiqStats(vidiqUrl) {
            const cachedResponse = getCachedStatsResponse(vidiqUrl);
            if (cachedResponse) {
                return cachedResponse;
            }

            const proxyUrls = buildVidiqProxyUrls(vidiqUrl);
            let lastError = null;

            for (const proxyUrl of proxyUrls) {
                try {
                    const response = await fetch(proxyUrl.toString(), {
                        cache: "no-store"
                    });
                    const responseText = await response.clone().text();

                    if (response.ok && looksLikeJson(responseText)) {
                        cacheStatsResponse(vidiqUrl, responseText);
                        return new Response(responseText, {
                            status: 200,
                            headers: {
                                "Content-Type": "application/json"
                            }
                        });
                    }

                    lastError = "API request failed with status " + response.status;
                } catch (error) {
                    lastError = error?.message || "Fetch failed";
                }
            }

            return new Response(JSON.stringify({
                error: lastError || "Unable to fetch VidIQ stats."
            }), {
                status: 502,
                headers: {
                    "Content-Type": "application/json"
                }
            });
        }

        function buildVidiqProxyUrls(vidiqUrl) {
            const workerUrl = new URL(WORKER_API_ORIGIN + "/vidiq/channel-stats");
            workerUrl.search = vidiqUrl.search;

            const allOriginsUrl = new URL("https://api.allorigins.win/raw");
            allOriginsUrl.searchParams.set("url", vidiqUrl.toString());

            return [workerUrl, allOriginsUrl];
        }

        function looksLikeJson(value) {
            const trimmed = value.trim();
            return trimmed.startsWith("{") || trimmed.startsWith("[");
        }

        function getCachedStatsResponse(vidiqUrl) {
            try {
                const cached = JSON.parse(localStorage.getItem(RESPONSE_CACHE_KEY) || "null");
                if (!cached || cached.url !== vidiqUrl.toString() || !cached.body) {
                    return null;
                }

                return new Response(cached.body, {
                    status: 200,
                    headers: {
                        "Content-Type": "application/json"
                    }
                });
            } catch (error) {
                return null;
            }
        }

        function cacheStatsResponse(vidiqUrl, body) {
            try {
                localStorage.setItem(RESPONSE_CACHE_KEY, JSON.stringify({
                    url: vidiqUrl.toString(),
                    body,
                    cached_at: new Date().toISOString()
                }));
            } catch (error) {
                localStorage.removeItem(RESPONSE_CACHE_KEY);
            }
        }

        function renderLineChart(target, stats, metric, stroke) {
            const data = getChartData(stats, metric);

            if (!data.length) {
                target.innerHTML = '<div class="chart-empty">No data</div>';
                return;
            }

            const width = 1600;
            const height = 420;
            const padding = { top: 10, right: 14, bottom: 54, left: 72 };
            const xMin = data[0].x;
            const xMax = data[data.length - 1].x;
            const yValues = data.map((point) => point.y);
            const yMin = Math.min(0, ...yValues);
            const yMax = getNiceAxisMax(Math.max(...yValues));
            const yRange = yMax - yMin || 1;

            const toX = (value) => {
                if (xMax === xMin) {
                    return width / 2;
                }
                return padding.left + ((value - xMin) / (xMax - xMin)) * (width - padding.left - padding.right);
            };

            const toY = (value) => {
                return height - padding.bottom - ((value - yMin) / yRange) * (height - padding.top - padding.bottom);
            };

            const points = data.map((point) => `${toX(point.x).toFixed(1)},${toY(point.y).toFixed(1)}`).join(" ");
            const areaPoints = [
                `${toX(data[0].x).toFixed(1)},${height - padding.bottom}`,
                points,
                `${toX(data[data.length - 1].x).toFixed(1)},${height - padding.bottom}`
            ].join(" ");

            const yTicks = [0, 0.2, 0.4, 0.6, 0.8, 1].map((ratio) => {
                const value = yMax - yRange * ratio;
                const y = padding.top + (height - padding.top - padding.bottom) * ratio;
                return { value, y };
            });
            const xTicks = getDateTicks(xMin, xMax, 10);

            target.innerHTML = `
                <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${metric} chart">
                    <defs>
                        <linearGradient id="${metric}-fill" x1="0" x2="0" y1="0" y2="1">
                            <stop offset="0%" stop-color="${stroke}" stop-opacity="0.26"></stop>
                            <stop offset="100%" stop-color="${stroke}" stop-opacity="0.05"></stop>
                        </linearGradient>
                    </defs>
                    ${yTicks.map((tick) => `
                        <line x1="${padding.left}" x2="${width - padding.right}" y1="${tick.y.toFixed(1)}" y2="${tick.y.toFixed(1)}" stroke="rgba(255,255,255,0.075)" stroke-width="1"></line>
                        <text x="${padding.left - 18}" y="${tick.y + 4}" text-anchor="end" fill="#ffffff" font-size="15" font-weight="700">${escapeHtml(formatAxisNumber(tick.value))}</text>
                    `).join("")}
                    ${xTicks.map((tick) => `
                        <text x="${toX(tick).toFixed(1)}" y="${height - 20}" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">${escapeHtml(formatAxisDate(tick))}</text>
                    `).join("")}
                    <polyline fill="url(#${metric}-fill)" stroke="none" points="${areaPoints}"></polyline>
                    <polyline fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linecap="butt" stroke-linejoin="round" points="${points}"></polyline>
                    <line data-hover-line x1="${padding.left}" x2="${padding.left}" y1="${padding.top}" y2="${height - padding.bottom}" stroke="${stroke}" stroke-width="1.5" stroke-dasharray="5 5" opacity="0"></line>
                    <circle data-hover-dot cx="${toX(data[data.length - 1].x)}" cy="${toY(data[data.length - 1].y)}" r="5" fill="${stroke}" stroke="#ffffff" stroke-width="2.5" opacity="0"></circle>
                    <rect data-hitbox x="${padding.left}" y="${padding.top}" width="${width - padding.left - padding.right}" height="${height - padding.top - padding.bottom}" fill="transparent" style="cursor: crosshair;"></rect>
                </svg>
                <div class="chart-tooltip" data-tooltip></div>
            `;

            const svg = target.querySelector("svg");
            const hitbox = target.querySelector("[data-hitbox]");
            const hoverLine = target.querySelector("[data-hover-line]");
            const hoverDot = target.querySelector("[data-hover-dot]");
            const tooltip = target.querySelector("[data-tooltip]");
            const metricLabel = getChartMetricLabel(metric);

            const showPoint = (clientX) => {
                const bounds = svg.getBoundingClientRect();
                const relativeX = ((clientX - bounds.left) / bounds.width) * width;

                let nearest = data[0];
                let nearestDistance = Math.abs(toX(data[0].x) - relativeX);

                for (let index = 1; index < data.length; index += 1) {
                    const point = data[index];
                    const distance = Math.abs(toX(point.x) - relativeX);
                    if (distance < nearestDistance) {
                        nearest = point;
                        nearestDistance = distance;
                    }
                }

                const pointX = toX(nearest.x);
                const pointY = toY(nearest.y);

                hoverLine.setAttribute("x1", pointX);
                hoverLine.setAttribute("x2", pointX);
                hoverLine.setAttribute("opacity", "1");
                hoverDot.setAttribute("cx", pointX);
                hoverDot.setAttribute("cy", pointY);
                hoverDot.setAttribute("opacity", "1");

                tooltip.innerHTML = `
                    <strong>${escapeHtml(formatNumber(nearest.y))}</strong>
                    <span>${escapeHtml(metricLabel)}</span>
                    <span>${escapeHtml(formatDate(nearest.recordedAt))}</span>
                `;
                tooltip.classList.add("visible");

                const pointPercentX = pointX / width;
                const pointPercentY = pointY / height;
                const placeLeft = pointPercentX > 0.62;
                const leftOffset = placeLeft ? "auto" : `calc(${(pointPercentX * 100).toFixed(2)}% + 10px)`;
                const rightOffset = placeLeft ? `calc(${((1 - pointPercentX) * 100).toFixed(2)}% + 10px)` : "auto";
                const topOffset = `calc(${Math.max(6, (pointPercentY * 100) - 12).toFixed(2)}% - 8px)`;

                tooltip.style.left = leftOffset;
                tooltip.style.right = rightOffset;
                tooltip.style.top = topOffset;
            };

            const hidePoint = () => {
                hoverLine.setAttribute("opacity", "0");
                hoverDot.setAttribute("opacity", "0");
                tooltip.classList.remove("visible");
            };

            hitbox.addEventListener("mousemove", (event) => {
                showPoint(event.clientX);
            });

            hitbox.addEventListener("mouseenter", (event) => {
                showPoint(event.clientX);
            });

            hitbox.addEventListener("mouseleave", hidePoint);

            hitbox.addEventListener("touchstart", (event) => {
                const touch = event.touches[0];
                if (touch) {
                    showPoint(touch.clientX);
                }
            }, { passive: true });

            hitbox.addEventListener("touchmove", (event) => {
                const touch = event.touches[0];
                if (touch) {
                    showPoint(touch.clientX);
                }
            }, { passive: true });

            hitbox.addEventListener("touchend", hidePoint);
        }

        function getChartData(stats, metric) {
            if (currentChartMode === "total") {
                return stats.map((entry) => ({
                    x: new Date(entry.recorded_at).getTime(),
                    y: Number(getMetricValue(entry, metric)) || 0,
                    recordedAt: entry.recorded_at
                }));
            }

            const sampledStats = resampleStats(stats, currentChartMode);

            return sampledStats
                .map((entry, index) => {
                    if (index === 0) {
                        return null;
                    }

                    const previous = sampledStats[index - 1];
                    const currentValue = Number(getMetricValue(entry, metric)) || 0;
                    const previousValue = Number(getMetricValue(previous, metric)) || 0;

                    return {
                        x: new Date(entry.recorded_at).getTime(),
                        y: currentValue - previousValue,
                        recordedAt: entry.recorded_at
                    };
                })
                .filter(Boolean);
        }

        function getChartMetricLabel(metric) {
            const baseLabel = metric.charAt(0).toUpperCase() + metric.slice(1);

            if (currentChartMode === "total") {
                return baseLabel;
            }

            const modeLabel = currentChartMode.charAt(0).toUpperCase() + currentChartMode.slice(1);
            return modeLabel + " " + baseLabel + " Gain";
        }

        function renderTable(stats) {
            const latestRows = stats.slice(-12).reverse();
            tableBodyEl.innerHTML = latestRows.map((entry) => {
                const previousEntry = getPreviousStatsEntry(stats, entry);

                return `
                    <tr>
                        <td>${escapeHtml(formatDate(entry.recorded_at))}</td>
                        <td>${renderMetricCell(entry, previousEntry, "subscribers")}</td>
                        <td>${renderMetricCell(entry, previousEntry, "views")}</td>
                        <td>${renderMetricCell(entry, previousEntry, "videos")}</td>
                    </tr>
                `;
            }).join("");
        }

        function getPreviousStatsEntry(stats, entry) {
            const index = stats.indexOf(entry);
            return index > 0 ? stats[index - 1] : null;
        }

        function renderMetricCell(entry, previousEntry, metric) {
            const value = Number(getMetricValue(entry, metric)) || 0;
            const previousValue = previousEntry ? Number(getMetricValue(previousEntry, metric)) || 0 : value;
            const gain = value - previousValue;

            return `
                <span class="metric-cell">
                    <span>${escapeHtml(formatNumber(value))}</span>
                    ${renderGain(gain)}
                </span>
            `;
        }

        function renderGain(gain) {
            const numericGain = Number(gain) || 0;
            const gainClass = numericGain < 0 ? " negative" : (numericGain === 0 ? " neutral" : "");
            const sign = numericGain > 0 ? "+" : "";

            return `<span class="metric-gain${gainClass}">${escapeHtml(sign + formatNumber(numericGain))}</span>`;
        }

        function buildCsvRows(stats, rawStats, layout) {
            if (layout === "horizontal") {
                return buildHorizontalRows(stats, rawStats);
            }

            const rows = [
                [
                    "recorded_at",
                    "original_subscribers",
                    "original_daily_gain",
                    "estimated_subscribers",
                    "estimated_daily_gain",
                    "original_views",
                    "views",
                    "videos"
                ]
            ];

            stats.forEach((entry, index) => {
                const rawEntry = rawStats[index] || entry;
                rows.push([
                    entry.recorded_at || "",
                    rawEntry.original_subscribers ?? rawEntry.subscribers ?? "",
                    rawEntry.original_daily_gain ?? "",
                    entry.estimated_subscribers ?? entry.original_subscribers ?? entry.subscribers ?? "",
                    entry.estimated_daily_gain ?? "",
                    rawEntry.original_views ?? rawEntry.views ?? "",
                    entry.views ?? entry.estimated_views ?? "",
                    entry.videos ?? ""
                ]);
            });

            return rows;
        }

        function buildCombinedCsvRows(channelEntries, frequency) {
            const rows = [];
            rows.push([]);
            rows.push(["subscribers"]);
            rows.push(...buildCombinedMetricRows(channelEntries, frequency, "subscribers"));
            rows.push([]);
            rows.push(["views"]);
            rows.push(...buildCombinedMetricRows(channelEntries, frequency, "views"));
            rows.push([]);
            rows.push(["videos"]);
            rows.push(...buildCombinedMetricRows(channelEntries, frequency, "videos"));
            return rows;
        }

        function buildCombinedMetricRows(channelEntries, frequency, metric) {
            const processedEntries = channelEntries
                .map((channelEntry) => {
                    const resampledStats = resampleStats(attachMetricSeries(channelEntry.stats), frequency);
                    const stats = metric === "subscribers"
                        ? getCombinedSubscriberStats(resampledStats)
                        : getCombinedMetricStats(resampledStats, metric);

                    return {
                        channelId: channelEntry.id || "",
                        channelTitle: channelEntry.title || "",
                        thumbnail: channelEntry.thumbnails || "",
                        stats
                    };
                })
                .filter((entry) => entry.stats.length > 0);

            const allDates = [];
            const seenDates = new Set();

            processedEntries.forEach((entry) => {
                entry.stats.forEach((stat) => {
                    const date = getCombinedFrequencyKey(stat.recorded_at, frequency);
                    if (!seenDates.has(date)) {
                        seenDates.add(date);
                        allDates.push(date);
                    }
                });
            });

            allDates.sort();

            const rows = [[
                "channel_title",
                "channel_id",
                "thumbnail",
                "row_type",
                ...allDates
            ]];

            processedEntries.forEach((entry) => {
                const valuesByDate = new Map();
                const gainsByDate = new Map();

                entry.stats.forEach((stat) => {
                    const key = getCombinedFrequencyKey(stat.recorded_at, frequency);
                    valuesByDate.set(key, getCombinedMetricValue(stat, metric));
                    gainsByDate.set(key, getCombinedMetricGainValue(stat, metric));
                });

                rows.push([
                    entry.channelTitle,
                    entry.channelId,
                    entry.thumbnail,
                    metric,
                    ...allDates.map((date) => valuesByDate.get(date) ?? "")
                ]);

                rows.push([
                    entry.channelTitle,
                    entry.channelId,
                    entry.thumbnail,
                    metric + "_daily_gain",
                    ...allDates.map((date) => gainsByDate.get(date) ?? "")
                ]);
            });

            return rows;
        }

        function getCombinedFrequencyKey(recordedAt, frequency) {
            return getFrequencyKey(new Date(recordedAt), frequency);
        }

        function getCombinedSubscriberStats(stats) {
            const estimatedStats = buildExportEstimatedStats(stats);
            return addDailyGainFields(estimatedStats, "estimated_subscribers", "estimated_daily_gain");
        }

        function getCombinedMetricStats(stats, metric) {
            const cloned = stats.map((entry) => ({ ...entry }));
            return addDailyGainFields(cloned, metric, metric + "_daily_gain");
        }

        function getCombinedMetricValue(entry, metric) {
            if (metric === "subscribers") {
                return estimateSubscribersInput.checked
                    ? entry.estimated_subscribers ?? entry.original_subscribers ?? entry.subscribers ?? ""
                    : entry.original_subscribers ?? entry.subscribers ?? "";
            }

            return entry[metric] ?? "";
        }

        function getCombinedMetricGainValue(entry, metric) {
            if (metric === "subscribers") {
                return estimateSubscribersInput.checked
                    ? entry.estimated_daily_gain ?? ""
                    : entry.original_daily_gain ?? "";
            }

            return entry[metric + "_daily_gain"] ?? "";
        }

        function buildHorizontalRows(stats, rawStats) {
            const header = ["metric"];
            const originalSubscribersRow = ["original_subscribers"];
            const originalDailyGainRow = ["original_daily_gain"];
            const estimatedSubscribersRow = ["estimated_subscribers"];
            const estimatedDailyGainRow = ["estimated_daily_gain"];
            const originalViewsRow = ["original_views"];
            const viewsRow = ["views"];
            const videosRow = ["videos"];

            stats.forEach((entry, index) => {
                const rawEntry = rawStats[index] || entry;
                header.push(entry.recorded_at || "");
                originalSubscribersRow.push(rawEntry.original_subscribers ?? rawEntry.subscribers ?? "");
                originalDailyGainRow.push(rawEntry.original_daily_gain ?? "");
                estimatedSubscribersRow.push(entry.estimated_subscribers ?? entry.original_subscribers ?? entry.subscribers ?? "");
                estimatedDailyGainRow.push(entry.estimated_daily_gain ?? "");
                originalViewsRow.push(rawEntry.original_views ?? rawEntry.views ?? "");
                viewsRow.push(entry.views ?? entry.estimated_views ?? "");
                videosRow.push(entry.videos ?? "");
            });

            return [
                header,
                originalSubscribersRow,
                originalDailyGainRow,
                estimatedSubscribersRow,
                estimatedDailyGainRow,
                originalViewsRow,
                viewsRow,
                videosRow
            ];
        }

        function buildExportEstimatedStats(stats) {
            const cloned = stats.map((entry) => ({ ...entry }));

            if (!estimateSubscribersInput.checked) {
                return cloned;
            }

            return applySubscriberEstimationByStep(cloned);
        }

        function attachMetricSeries(stats) {
            return attachViewSeries(attachSubscriberSeries(stats));
        }

        function attachSubscriberSeries(stats) {
            return stats.map((entry) => ({
                ...entry,
                original_subscribers: smoothSubscriberValue(Number(entry.subscribers) || 0, entry.recorded_at),
                estimated_subscribers: smoothSubscriberValue(Number(entry.subscribers) || 0, entry.recorded_at)
            }));
        }

        function attachViewSeries(stats) {
            const withSeries = stats.map((entry) => {
                const viewValue = getFiniteMetricValue(entry.views);
                const normalizedViews = viewValue ?? "";

                return {
                    ...entry,
                    original_views: normalizedViews,
                    estimated_views: normalizedViews,
                    views: normalizedViews
                };
            });

            return applyViewEstimation(withSeries);
        }

        function getFiniteMetricValue(value) {
            if (value === null || value === undefined || value === "") {
                return null;
            }

            const numericValue = Number(value);
            return Number.isFinite(numericValue) ? numericValue : null;
        }

        function smoothSubscriberValue(value, recordedAt) {
            const time = new Date(recordedAt).getTime();
            if (time < SUBSCRIBER_ESTIMATE_START || value <= 0) {
                return value;
            }

            const magnitude = Math.floor(Math.log10(value));
            const precisionPower = Math.max(0, magnitude - 2);
            const step = 10 ** precisionPower;
            return Math.floor(value / step) * step;
        }

        function applySubscriberEstimation(stats) {
            if (stats.length < 2) {
                return stats;
            }

            for (let index = 0; index < stats.length; index += 1) {
                stats[index].estimated_subscribers = stats[index].original_subscribers;
            }

            let anchorStart = -1;

            for (let index = 0; index < stats.length; index += 1) {
                const current = stats[index];
                const currentTime = new Date(current.recorded_at).getTime();

                if (currentTime < SUBSCRIBER_ESTIMATE_START) {
                    continue;
                }

                if (anchorStart === -1) {
                    anchorStart = index;
                    continue;
                }

                if (current.original_subscribers === stats[anchorStart].original_subscribers) {
                    continue;
                }

                interpolateSubscriberSegment(stats, anchorStart, index);
                anchorStart = index;
            }

            return stats;
        }

        function applySubscriberEstimationByStep(stats) {
            if (stats.length < 2) {
                return stats;
            }

            for (let index = 0; index < stats.length; index += 1) {
                stats[index].estimated_subscribers = stats[index].original_subscribers;
            }

            let anchorStart = -1;

            for (let index = 0; index < stats.length; index += 1) {
                const current = stats[index];
                const currentTime = new Date(current.recorded_at).getTime();

                if (currentTime < SUBSCRIBER_ESTIMATE_START) {
                    continue;
                }

                if (anchorStart === -1) {
                    anchorStart = index;
                    continue;
                }

                if (current.original_subscribers === stats[anchorStart].original_subscribers) {
                    continue;
                }

                interpolateSubscriberSegmentByStep(stats, anchorStart, index);
                anchorStart = index;
            }

            return stats;
        }

        function interpolateSubscriberSegment(stats, startIndex, endIndex) {
            if (endIndex - startIndex <= 1) {
                return;
            }

            const startEntry = stats[startIndex];
            const endEntry = stats[endIndex];
            const startTime = new Date(startEntry.recorded_at).getTime();
            const endTime = new Date(endEntry.recorded_at).getTime();
            const totalDuration = endTime - startTime;

            if (totalDuration <= 0) {
                return;
            }

            for (let index = startIndex + 1; index < endIndex; index += 1) {
                const currentTime = new Date(stats[index].recorded_at).getTime();
                const ratio = (currentTime - startTime) / totalDuration;
                stats[index].estimated_subscribers = Math.round(
                    startEntry.original_subscribers +
                    (endEntry.original_subscribers - startEntry.original_subscribers) * ratio
                );
            }
        }

        function interpolateSubscriberSegmentByStep(stats, startIndex, endIndex) {
            const steps = endIndex - startIndex;
            if (steps <= 1) {
                return;
            }

            const startValue = Number(stats[startIndex].original_subscribers) || 0;
            const endValue = Number(stats[endIndex].original_subscribers) || 0;
            const delta = endValue - startValue;

            for (let index = startIndex + 1; index < endIndex; index += 1) {
                const progress = (index - startIndex) / steps;
                stats[index].estimated_subscribers = Math.round(
                    startValue + delta * progress
                );
            }
        }

        function applyViewEstimation(stats) {
            if (stats.length < 2) {
                return stats;
            }

            let anchorStart = -1;

            for (let index = 0; index < stats.length; index += 1) {
                const currentValue = getFiniteMetricValue(stats[index].original_views);
                if (currentValue === null) {
                    continue;
                }

                stats[index].estimated_views = currentValue;
                stats[index].views = currentValue;

                if (anchorStart !== -1) {
                    interpolateViewSegment(stats, anchorStart, index);
                }

                anchorStart = index;
            }

            return stats;
        }

        function interpolateViewSegment(stats, startIndex, endIndex) {
            if (endIndex - startIndex <= 1) {
                return;
            }

            const startEntry = stats[startIndex];
            const endEntry = stats[endIndex];
            const startValue = getFiniteMetricValue(startEntry.original_views);
            const endValue = getFiniteMetricValue(endEntry.original_views);
            const startTime = new Date(startEntry.recorded_at).getTime();
            const endTime = new Date(endEntry.recorded_at).getTime();
            const totalDuration = endTime - startTime;

            if (startValue === null || endValue === null || totalDuration <= 0) {
                return;
            }

            for (let index = startIndex + 1; index < endIndex; index += 1) {
                const currentTime = new Date(stats[index].recorded_at).getTime();
                const ratio = (currentTime - startTime) / totalDuration;
                const estimatedValue = Math.round(startValue + (endValue - startValue) * ratio);
                stats[index].estimated_views = estimatedValue;
                stats[index].views = estimatedValue;
            }
        }

        function addDailyGainFields(stats, subscriberField, gainField) {
            return stats.map((entry, index) => {
                if (index === 0) {
                    return {
                        ...entry,
                        [gainField]: ""
                    };
                }

                const previous = stats[index - 1];
                const currentValue = Number(entry[subscriberField]) || 0;
                const previousValue = Number(previous[subscriberField]) || 0;

                return {
                    ...entry,
                    [gainField]: currentValue - previousValue
                };
            });
        }

        function getMetricValue(entry, metric) {
            if (metric === "subscribers" && estimateSubscribersInput.checked) {
                return entry.estimated_subscribers ?? entry.original_subscribers ?? entry.subscribers;
            }

            if (metric === "subscribers") {
                return entry.original_subscribers ?? entry.subscribers;
            }

            return entry[metric];
        }

        function resampleStats(stats, frequency) {
            if (frequency === "hourly") {
                return stats.slice();
            }

            const grouped = new Map();

            stats.forEach((entry) => {
                const date = new Date(entry.recorded_at);
                const key = getFrequencyKey(date, frequency);

                if (!grouped.has(key) || new Date(grouped.get(key).recorded_at) < date) {
                    grouped.set(key, entry);
                }
            });

            return Array.from(grouped.values()).sort((a, b) => new Date(a.recorded_at) - new Date(b.recorded_at));
        }

        function getFrequencyKey(date, frequency) {
            const year = date.getUTCFullYear();
            const month = String(date.getUTCMonth() + 1).padStart(2, "0");
            const day = String(date.getUTCDate()).padStart(2, "0");
            const hour = String(date.getUTCHours()).padStart(2, "0");

            if (frequency === "daily") {
                return `${year}-${month}-${day}`;
            }

            if (frequency === "weekly") {
                const weekStart = startOfUtcWeek(date);
                const weekYear = weekStart.getUTCFullYear();
                const weekMonth = String(weekStart.getUTCMonth() + 1).padStart(2, "0");
                const weekDay = String(weekStart.getUTCDate()).padStart(2, "0");
                return `${weekYear}-${weekMonth}-${weekDay}`;
            }

            if (frequency === "monthly") {
                return `${year}-${month}`;
            }

            return `${year}-${month}-${day}T${hour}`;
        }

        function startOfUtcWeek(date) {
            const copy = new Date(date);
            const day = copy.getUTCDay();
            const diff = day === 0 ? -6 : 1 - day;
            copy.setUTCDate(copy.getUTCDate() + diff);
            copy.setUTCHours(0, 0, 0, 0);
            return copy;
        }

        function getRandomChannelId() {
            const index = Math.floor(Math.random() * RANDOM_CHANNEL_IDS.length);
            return RANDOM_CHANNEL_IDS[index];
        }

        function parseChannelIds(value) {
            return String(value || "")
                .split(/[\s,]+/)
                .map((entry) => entry.trim())
                .filter(Boolean)
                .filter((entry, index, entries) => entries.indexOf(entry) === index);
        }

        function downsample(items, maxPoints) {
            if (items.length <= maxPoints) {
                return items;
            }

            const step = (items.length - 1) / (maxPoints - 1);
            const sampled = [];

            for (let index = 0; index < maxPoints; index += 1) {
                sampled.push(items[Math.round(index * step)]);
            }

            return sampled;
        }

        function setLoading(isLoading) {
            fetchButton.disabled = isLoading;
            fetchButton.textContent = isLoading ? "Loading..." : "Fetch Data";
        }

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.remove("idle");
            statusEl.classList.toggle("error", Boolean(isError));
        }

        function getFetchErrorMessage(error) {
            const message = error?.message || "";
            if (message === "Failed to fetch" || error instanceof TypeError) {
                return "The public stats API is not reachable right now. Try again shortly.";
            }

            return message || "Something went wrong while fetching data.";
        }

        function clearStatus() {
            statusEl.textContent = "";
            statusEl.classList.add("idle");
            statusEl.classList.remove("error");
        }

        function getCurrentUtcDateString() {
            return new Date().toISOString().slice(0, 10);
        }

        function formatCompact(value) {
            return new Intl.NumberFormat("en-US", {
                notation: "compact",
                maximumFractionDigits: 2
            }).format(Number(value) || 0);
        }

        function formatAxisNumber(value) {
            const numericValue = Number(value) || 0;
            const sign = numericValue < 0 ? "-" : "";
            const absoluteValue = Math.abs(numericValue);

            if (absoluteValue >= 1000000000) {
                return sign + trimAxisNumber(absoluteValue / 1000000000) + "B";
            }

            if (absoluteValue >= 1000000) {
                return sign + trimAxisNumber(absoluteValue / 1000000) + "M";
            }

            if (absoluteValue >= 1000) {
                return sign + trimAxisNumber(absoluteValue / 1000) + "K";
            }

            return String(Math.round(numericValue));
        }

        function trimAxisNumber(value) {
            return Number.isInteger(value) ? String(value) : value.toFixed(1).replace(/\.0$/, "");
        }

        function getNiceAxisMax(value) {
            const numericValue = Number(value) || 0;
            if (numericValue <= 0) {
                return 1;
            }

            const candidates = [1, 2, 2.5, 5, 10];
            let bestMax = Infinity;

            for (let divisions = 5; divisions <= 8; divisions += 1) {
                const roughStep = numericValue / divisions;
                const magnitude = 10 ** Math.floor(Math.log10(roughStep));

                for (const candidate of candidates) {
                    const axisMax = candidate * magnitude * divisions;
                    if (axisMax >= numericValue * 1.03 && axisMax < bestMax) {
                        bestMax = axisMax;
                    }
                }
            }

            return Number.isFinite(bestMax) ? bestMax : numericValue * 1.05;
        }

        function getDateTicks(startTime, endTime, maxTicks) {
            if (endTime <= startTime) {
                return [startTime];
            }

            const startDate = new Date(startTime);
            const endDate = new Date(endTime);
            const ticks = [];
            const totalYears = endDate.getUTCFullYear() - startDate.getUTCFullYear();
            const yearStep = Math.max(1, Math.ceil(totalYears / Math.max(1, maxTicks - 1)));
            let year = startDate.getUTCFullYear();

            for (; year <= endDate.getUTCFullYear(); year += yearStep) {
                const tick = Date.UTC(year, 0, 1);
                if (tick >= startTime && tick <= endTime) {
                    ticks.push(tick);
                }
            }

            if (!ticks.length || ticks[0] > startTime + 86400000 * 45) {
                ticks.unshift(startTime);
            }

            if (ticks[ticks.length - 1] < endTime - 86400000 * 45) {
                ticks.push(endTime);
            }

            return ticks.slice(0, maxTicks);
        }

        function formatAxisDate(value) {
            return new Date(value).toLocaleDateString("en-US", {
                year: "numeric",
                month: "short",
                day: "2-digit"
            });
        }

        function formatNumber(value) {
            return new Intl.NumberFormat("en-US").format(Number(value) || 0);
        }

        function formatDate(value) {
            return new Date(value).toLocaleString("en-US", {
                year: "numeric",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit"
            });
        }

        function formatShortDate(value) {
            return new Date(value).toLocaleDateString("en-US", {
                year: "numeric",
                month: "short",
                day: "numeric"
            });
        }

        function escapeCsv(value) {
            const stringValue = String(value ?? "");
            return `"${stringValue.replace(/"/g, "\"\"")}"`;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
    </script>
